<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SnowMail 管理员登录</title>
<style>
:root{
  --bg:#060b12;
  --panel:rgba(12,20,32,0.92);
  --border:rgba(116,151,196,0.18);
  --text:#eef5ff;
  --muted:rgba(216,228,245,0.78);
  --soft:rgba(173,191,217,0.5);
  --button:#d9ecff;
  --button-text:#07111f;
  --danger:#ff8b8b;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:"Inter","PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text);
  background:
    linear-gradient(rgba(117,151,194,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(117,151,194,0.035) 1px, transparent 1px),
    radial-gradient(circle at 18% 8%, rgba(79,145,255,0.16), transparent 30%),
    radial-gradient(circle at 82% 18%, rgba(86,209,222,0.09), transparent 28%),
    linear-gradient(180deg, #070b12 0%, var(--bg) 100%);
  background-size:42px 42px,42px 42px,auto,auto,auto;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:linear-gradient(110deg, transparent 0 36%, rgba(141,190,255,0.055) 45%, transparent 54% 100%);
}
.wrap{
  position:relative;
  z-index:1;
  min-height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.card{
  width:min(440px,92vw);
  padding:32px;
  border-radius:24px;
  background:var(--panel);
  border:1px solid var(--border);
  backdrop-filter:blur(18px) saturate(1.08);
  -webkit-backdrop-filter:blur(18px) saturate(1.08);
  box-shadow:0 18px 48px rgba(0,0,0,0.18);
}
.logo{
  font-family:"Georgia",serif;
  font-size:34px;
  letter-spacing:6px;
}
h1{
  margin-top:14px;
  font-family:"Georgia",serif;
  font-size:30px;
  font-weight:500;
}
p{
  margin-top:8px;
  color:var(--soft);
  line-height:1.7;
  font-size:13px;
}
input{
  width:100%;
  margin-top:18px;
  padding:13px 14px;
  border-radius:12px;
  border:1px solid rgba(117,151,194,0.16);
  background:rgba(0,0,0,0.14);
  color:var(--text);
  outline:none;
}
input:focus{
  border-color:rgba(117,184,255,0.46);
  box-shadow:0 0 0 4px rgba(117,184,255,0.08);
}
button{
  width:100%;
  margin-top:16px;
  padding:13px 16px;
  font-size:14px;
  border-radius:12px;
  border:none;
  background:var(--button);
  color:var(--button-text);
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.7;cursor:not-allowed}
.error{
  display:none;
  margin-top:14px;
  padding:11px 13px;
  border-radius:12px;
  background:rgba(255,96,96,0.08);
  border:1px solid rgba(255,96,96,0.18);
  color:#ffd0d0;
  font-size:13px;
}
.error.show{display:block}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">SNOWMAIL</div>
    <h1>管理员登录</h1>
    <p>请输入管理员密码后进入后台。</p>
    <form id="login-form">
      <input id="password" type="password" placeholder="请输入管理员密码" autocomplete="current-password">
      <div class="error" id="error"></div>
      <button id="submit" type="submit">进入后台</button>
    </form>
  </div>
</div>

<script>
const form = document.getElementById('login-form');
const passwordInput = document.getElementById('password');
const submitButton = document.getElementById('submit');
const errorBox = document.getElementById('error');

function showError(message) {
  errorBox.textContent = message;
  errorBox.classList.add('show');
}

function clearError() {
  errorBox.textContent = '';
  errorBox.classList.remove('show');
}

form.addEventListener('submit', async event => {
  event.preventDefault();
  clearError();
  const password = passwordInput.value.trim();

  if (!password) {
    showError('请输入管理员密码。');
    passwordInput.focus();
    return;
  }

  submitButton.disabled = true;
  submitButton.textContent = '验证中...';

  try {
    const response = await fetch('/api/admin/login', {
      method: 'POST',
      credentials: 'same-origin',
      cache: 'no-store',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ password }),
    });

    const data = await response.json();
    if (!response.ok) {
      throw new Error(data.error || '登录失败');
    }

    window.location.href = '/admin';
  } catch (error) {
    showError(error.message || '登录失败，请稍后再试。');
    submitButton.disabled = false;
    submitButton.textContent = '进入后台';
    passwordInput.focus();
    passwordInput.select();
  }
});
</script>
</body>
</html>
